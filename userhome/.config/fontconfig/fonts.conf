<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Append LXGW WenKai as CJK fallback for terminal fonts -->
  <match target="pattern">
    <test name="family" compare="eq">
      <string>Mononoki Nerd Font Mono</string>
    </test>
    <edit name="family" mode="append">
      <string>LXGW WenKai</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>Monaco</string>
    </test>
    <edit name="family" mode="append">
      <string>LXGW WenKai</string>
    </edit>
  </match>

  <!-- Default fonts for all applications -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Monaco</family>
      <family>LXGW WenKai</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Monaco</family>
      <family>LXGW WenKai</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Monaco</family>
      <family>LXGW WenKai</family>
    </prefer>
  </alias>

  <!-- CJK: prefer LXGW WenKai when language is zh/ja/ko -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>zh</string>
    </test>
    <edit name="family" mode="prepend">
      <string>LXGW WenKai</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>ja</string>
    </test>
    <edit name="family" mode="prepend">
      <string>LXGW WenKai</string>
    </edit>
  </match>

</fontconfig>
